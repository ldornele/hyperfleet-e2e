# Test adapter configuration with invalid precondition URL to test error detection
# The precondition references a non-existent service, causing the adapter to fail
# before reaching the resource creation phase.

# Parameters with all required variables
params:
    - name: "clusterId"
      source: "event.id"
      type: "string"
      required: true
    - name: "testRunId"
      source: "env.TEST_RUN_ID"
      type: "string"
      required: false
      default: "TEST_RUN_ID"
    - name: "ci"
      source: "env.CI"
      type: "string"
      required: false
      default: "false"

# Precondition with INVALID API endpoint URL to simulate adapter failure
preconditions:
  - name: "clusterStatus"
    api_call:
      method: "GET"
      url: "http://invalid-service:8080/api/nonexistent"
      timeout: 5s
      retry_attempts: 1
      retry_backoff: "exponential"
    capture:
      - name: "clusterName"
        field: "name"

# Resources (will never be reached due to precondition failure)
resources:
  - name: "clusterNamespace"
    transport:
      client: "kubernetes"
    manifest:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ .clusterId }}"
        labels:
          hyperfleet.io/cluster-id: "{{ .clusterId }}"
          e2e.hyperfleet.io/test-run-id: "{{ .testRunId }}"
          e2e.hyperfleet.io/ci: "{{ .ci }}"
          e2e.hyperfleet.io/managed-by: "test-framework"
    discovery:
      namespace: "*"
      by_selectors:
        label_selector:
          hyperfleet.io/cluster-id: "{{ .clusterId }}"

# Post-processing with status reporting
post:
  payloads:
    - name: "clusterStatusPayload"
      build:
        adapter: "{{ .adapter.name }}"
        conditions:
          - type: "Applied"
            status:
              expression: |
                resources.?clusterNamespace.?status.?phase.orValue("") == "Active" ? "True" : "False"
            reason:
              expression: |
                resources.?clusterNamespace.?status.?phase.orValue("") == "Active"
                  ? "NamespaceCreated"
                  : "NamespacePending"
            message:
              expression: |
                resources.?clusterNamespace.?status.?phase.orValue("") == "Active"
                  ? "Namespace created successfully"
                  : "Namespace creation in progress"
          - type: "Available"
            status:
              expression: |
                resources.?clusterNamespace.?status.?phase.orValue("") == "Active" ? "True" : "False"
            reason:
              expression: |
                resources.?clusterNamespace.?status.?phase.orValue("") == "Active"
                  ? "NamespaceReady"
                  : "NamespaceNotReady"
            message:
              expression: |
                resources.?clusterNamespace.?status.?phase.orValue("") == "Active"
                  ? "Namespace is active and ready"
                  : "Namespace is not active and ready"
          - type: "Health"
            status:
              expression: |
                adapter.?executionStatus.orValue("") == "success"
                  && !(adapter.?resourcesSkipped.orValue(false) && adapter.?errorReason.orValue("") != "")
                ? "True" : "False"
            reason:
              expression: |
                adapter.?executionStatus.orValue("") != "success"
                  ? "ExecutionFailed"
                  : adapter.?errorReason.orValue("") != ""
                    ? adapter.?errorReason.orValue("")
                    : "Healthy"
            message:
              expression: |
                adapter.?executionStatus.orValue("") != "success"
                  ? adapter.?errorMessage.orValue("Adapter execution failed")
                  : adapter.?errorMessage.orValue("") != ""
                    ? adapter.?errorMessage.orValue("")
                    : "All adapter operations completed successfully"
        observed_generation:
          expression: "1"
        observed_time: "{{ now | date \"2006-01-02T15:04:05Z07:00\" }}"

  post_actions:
    - name: "reportClusterStatus"
      api_call:
        method: "PUT"
        url: "/clusters/{{ .clusterId }}/statuses"
        headers:
          - name: "Content-Type"
            value: "application/json"
        body: "{{ .clusterStatusPayload }}"
